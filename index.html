<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painter</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header>
        <div class="logo">Painter</div>
        <nav>
            <ul>
                <li><a href="#" id="new-file">Новый</a></li>
                <li><a href="#" id="open-file">Открыть</a></li>
                <li><a href="#" id="save-file">Сохранить</a></li>
                <li><a href="#" id="save-as-png">Сохранить как PNG</a></li>
                <li><a href="#" id="save-as-jpg">Сохранить как JPG</a></li>
            </ul>
        </nav>
    </header>

    <div class="container">
        <div class="toolbar">
            <div class="tool-group">
                <label>Инструменты:</label>
                <button data-tool="pencil" title="Карандаш (P)">P</button>
                <button data-tool="brush" title="Кисть (B)">B</button>
                <button data-tool="eraser" title="Ластик (E)">E</button>
                <button data-tool="fill" title="Заливка (G)">G</button>
                <button data-tool="line" title="Линия (L)">L</button>
                <button data-tool="rectangle" title="Прямоугольник (R)">R</button>
                <button data-tool="oval" title="Овал (O)">O</button>
                <button data-tool="pipette" title="Пипетка (I)">I</button>
                <button data-tool="text" title="Текст (T)">T</button>
            </div>

            <div class="tool-group">
                <label>Размеры:</label>
                <input type="range" id="line-width" min="1" max="50" value="5">
                <span id="line-width-value">5</span>px
            </div>

            <div class="tool-group">
                <label>Цвета:</label>
                <div class="color-palette">
                    <div class="main-color-display">
                        <label for="main-color">Основной:</label>
                        <input type="color" id="main-color" value="#000000">
                    </div>
                    <div class="secondary-color-display">
                        <label for="secondary-color">Дополнительный:</label>
                        <input type="color" id="secondary-color" value="#ffffff">
                    </div>
                    <button id="swap-colors" title="Поменять местами цвета">⇋</button>
                </div>
            </div>

            <div class="tool-group">
                <label>Эффекты:</label>
                <button id="undo" title="Отменить (Ctrl+Z)">Undo</button>
                <button id="redo" title="Повторить (Ctrl+Y)">Redo</button>
                <button id="clear-canvas" title="Очистить холст (Ctrl+N)">Clear</button>
                <button id="invert-colors" title="Инвертировать цвета">Invert</button>
                <button id="grayscale" title="Оттенки серого">Grayscale</button>
            </div>

            <div class="tool-group">
                <label>Настройки холста:</label>
                <button id="resize-canvas">Изменить размер</button>
            </div>
        </div>

        <div class="canvas-area">
            <canvas id="canvas"></canvas>
        </div>
    </div>

    <div id="resize-modal" class="modal">
        <div class="modal-content">
            <h2>Изменить размер холста</h2>
            <label for="canvas-width-input">Ширина:</label>
            <input type="number" id="canvas-width-input">
            <label for="canvas-height-input">Высота:</label>
            <input type="number" id="canvas-height-input">
            <button id="apply-resize">Применить</button>
            <button class="close-modal">Отмена</button>
        </div>
    </div>

    <script src="js/script.js"></script>
</body>
</html>
