<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Decision Roulette web</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <header>
            <div class="logo">Decision Helper</div>
            <p class="tagline">Пусть случай поможет вам выбрать!</p>
        </header>

        <main>
            <section class="options-section">
                <h2>Ваши варианты</h2>
                <div class="options-input-area">
                    <textarea id="options-list" placeholder="Введите каждый вариант на новой строке..."></textarea>
                    <div class="options-controls">
                        <button id="add-option-btn" class="btn btn-secondary">Добавить вариант</button>
                        <button id="clear-options-btn" class="btn btn-danger">Очистить все</button>
                    </div>
                </div>
                <div class="options-display">
                    <h3>Список вариантов:</h3>
                    <ul id="options-display-list">
                        <!-- Варианты будут добавляться сюда -->
                    </ul>
                </div>
            </section>

            <section class="roulette-section">
                <button id="spin-btn" class="btn btn-primary spin-button">
                    <span class="spin-icon">⚙️</span>
                    <span class="spin-text">Крутить рулетку!</span>
                </button>
                <div id="result-display" class="result-display">
                    <p>Нажмите "Крутить рулетку!", чтобы получить ответ.</p>
                </div>
            </section>
        </main>

        <footer>
            <p>&copy; 2023 Decision Helper. Все права защищены.</p>
        </footer>
    </div>

    <script src="js/script.js"></script>
</body>
</html>
